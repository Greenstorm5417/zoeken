# Zoeken complete configuration reference.
#
# Zoeken uses YAML. Every active value in this file equals the typed application
# default. Optional collection entries are documented as comments because adding
# one would change the effective configuration.
#
# Load with:
#   APP_SETTINGS_PATH=default.config.yml
#
# Environment variables override this file. See docs/settings.yml.example for
# deployment-oriented examples and the supported APP_* names.

# false replaces built-ins with this complete document. true deep-merges a
# partial document onto defaults. It can also be a mapping with engine filters.
use_default_settings: false
# use_default_settings:
#   engines:
#     remove: []
#     keep_only: []

general:
  debug: false
  instance_name: "Search"
  # About-page privacy / contact links. null or false hides the link.
  # Set a real URL for your instance — do not invent one.
  # Examples:
  #   privacypolicy_url: "https://example.test/privacy"
  #   contact_url: "mailto:ops@example.test"
  privacypolicy_url: null
  contact_url: null
  donation_url: null
  enable_metrics: true
  # Empty disables /metrics and leaves /stats open. A non-empty value is the
  # HTTP Basic password for /metrics, /stats, and /stats/errors (any username).
  open_metrics: ""

brand:
  # About Source / GIT_URL: prefer custom.links.Source, else strip /issues from
  # issue_url. Leave empty for private instances.
  # Example: "https://github.com/example/zoeken/issues"
  issue_url: ""
  # Example: "https://github.com/example/zoeken#readme"
  docs_url: ""
  custom:
    links: {}
    # links:
    #   Source: "https://example.test/source"
  pwa_colors:
    theme_color_light: "#246018"
    background_color_light: "#f2f5ee"
    theme_color_dark: "#8fd46a"
    background_color_dark: "#0f1410"
    theme_color_black: "#246018"
    background_color_black: "#000"

search:
  # 0 = off, 1 = moderate, 2 = strict
  safe_search: 0
  # Empty disables autocomplete. Prefer `brave` for rich suggestions (image + subtext).
  autocomplete: "brave"
  autocomplete_min: 1
  # Empty disables result favicons. Allowed providers: allesedv, duckduckgo,
  # google, yandex.
  favicon_resolver: "duckduckgo"
  # Empty means all languages.
  default_lang: ""
  languages: []
  ban_time_on_fail: 5.0
  max_ban_time_on_fail: 120.0
  # replace (default): non-empty engines: is the full registry.
  # merge: overlay engines: onto the built-in catalog by id.
  # Empty engines: always selects the built-in catalog.
  engine_list_mode: replace
  # Circuit cooldown policy (sole engine-health gate). DDG captcha → no circuit.
  suspended_times:
    SearxEngineAccessDenied: 86400.0
    SearxEngineCaptcha: 86400.0
    SearxEngineTooManyRequests: 3600.0
    cf_SearxEngineCaptcha: 1296000.0
    cf_SearxEngineAccessDenied: 86400.0
    recaptcha_SearxEngineCaptcha: 604800.0
  formats:
    - html
    - csv
    - json
    - rss
  # 0 means unlimited.
  max_page: 0

server:
  # Integer or numeric string.
  port: 8888
  bind_address: "127.0.0.1"
  limiter: false
  public_instance: false
  # Public binds require at least 16 non-placeholder characters.
  secret_key: ""
  # false or an absolute public URL.
  base_url: false
  image_proxy: true
  # 1.0 or 1.1
  http_protocol_version: "1.0"
  # POST or GET
  method: "POST"
  default_http_headers: {}
  # default_http_headers:
  #   X-Robots-Tag: "noindex, nofollow"
  # Skip SPA index.html boot check (also APP_DISABLE_UI=1).
  disable_ui: false

deployment:
  # trace, debug, info, warn, or error
  log_level: "info"
  shutdown_grace_seconds: 30
  max_request_body_bytes: 1048576
  request_timeout_seconds: 30
  hsts: false
  content_security_policy: "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'"
  metrics_enabled: true
  trusted_proxies: []

ui:
  default_theme: "simple"
  default_locale: ""
  theme_args:
    # auto, light, dark, or black
    simple_style: "auto"
  results_on_new_tab: false
  query_in_title: false
  # Empty by default (no "archive" link on results). Set to a Wayback
  # Machine base URL (e.g. "https://web.archive.org/web/") to enable it.
  cache_url: ""
  search_on_category_select: true
  # default or vim
  hotkeys: "default"
  # pretty, full, or host
  url_formatting: "pretty"

outgoing:
  useragent_suffix: ""
  request_timeout: 3.0
  enable_http2: true
  # true only — verify: false and custom CA paths are rejected at boot
  verify: true
  max_request_timeout: null
  pool_connections: 100
  pool_maxsize: 10
  keepalive_expiry: 5.0
  max_response_bytes: 10485760
  max_redirects: 30
  retries: 0
  # null, one proxy URL, or a map with all/http/https URL values.
  proxies: null
  # null, one IP, or a list of IPs.
  source_ips: null
  using_tor_proxy: false
  extra_proxy_timeout: 0
  origin_limits:
    requests_per_second: 1.0
    burst: 2
    max_concurrent: 2
    lease_seconds: 15
  networks: {}
  # Named profiles inherit outgoing values. Every accepted override is shown:
  # networks:
  #   example:
  #     request_timeout: null
  #     enable_http2: null
  #     # verify must stay true if set
  #     verify: true
  #     max_request_timeout: null
  #     pool_connections: null
  #     pool_maxsize: null
  #     keepalive_expiry: null
  #     max_redirects: null
  #     retries: null
  #     retry_on_http_error: null
  #     proxies: null
  #     source_ips: null
  #     using_tor_proxy: null
  #     extra_proxy_timeout: null
  #     network: null

# Engine catalog. Empty list → built-in catalog.
# Non-empty + search.engine_list_mode=replace (default) → ONLY these engines.
# Non-empty + search.engine_list_mode=merge → overlay onto built-ins by id.
# A non-empty entry accepts every typed field below plus engine-specific keys.
engines: []
# engines:
#   - name: "example"
#     engine: null
#     shortcut: null
#     categories: null
#     timeout: null
#     disabled: null
#     weight: null
#     tokens: null
#     network: null
#     inactive: null
#     # Engine-specific keys include base_url, api_key, and generic parser
#     # selectors documented by that engine.

# Keys are preference ids for SPA client-features (see docs/client-features.md).
# The server does not execute plugins; entries only set default enabled state.
plugins: {}
# plugins:
#   calculator:
#     active: null

categories_as_tabs:
  files: {}
  general: {}
  images: {}
  it: {}
  map: {}
  music: {}
  news: {}
  science: {}
  shopping: {}
  social media: {}
  videos: {}

storage:
  backend: sqlite
  sqlite:
    path: "./zoeken.sqlite3"
    busy_timeout_ms: 5000
  postgres:
    url: null
    max_connections: 16
    acquire_timeout_seconds: 5

cache:
  search:
    ttl_seconds: 60
    structured_ttl_seconds: 300
    max_bytes: 134217728
  autocomplete:
    ttl_seconds: 300
    max_entries: 2048
  favicons:
    positive_ttl_seconds: 2592000
    negative_ttl_seconds: 86400
    max_blob_bytes: 20480
    max_total_bytes: 268435456

preferences:
  # Supported lock names: theme, locale, language, categories, engines,
  # safesearch, autocomplete, image_proxy, method, plugins.
  lock: []

doi_resolvers: {}
# doi_resolvers:
#   doi.org: "https://doi.org/"
default_doi_resolver: null

# Flattened hostname plugin settings: replace map and remove/high_priority/
# low_priority string lists. Enable/disable the plugin in Preferences; rules
# themselves are instance-level only (not per-user cookies).
hostnames: {}
# hostnames:
#   replace:
#     "(www\\.)?youtube\\.com$": "yewtu.be"
#   remove:
#     - "(^|\\.)tracker\\.example$"
#   high_priority:
#     - "(^|\\.)wikipedia\\.org$"
#   low_priority:
#     - "(^|\\.)pinterest\\."

# Empty uses the bundled limiter data asset. Optional keys are file, toml, and
# link_token. file and toml are mutually prioritized, with toml first.
limiter: {}
# limiter:
#   file: "path/to/limiter.toml"
#   toml: |
#     [botdetection]
#   link_token: ""

# Empty uses ImageProxyPolicy defaults. max_image_bytes and max_bytes are aliases
# for the 5 MiB default.
favicons: {}
# favicons:
#   max_image_bytes: 5242880
